/* File: visits.html | Version: v19.0.0 | Full Fields Integration */
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام MSP - توثيق الزيارات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="visits.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="msp-main-content">
        <form id="visitForm">
            <input type="hidden" id="edit_id">
            
            <div class="form-section">
                <div class="section-header"><i class="fas fa-industry"></i> بيانات المنشأة</div>
                <div class="msp-grid">
                    <div class="msp-item"><label>المحافظة</label><select id="f01_governorate" class="msp-input" required></select></div>
                    <div class="msp-item"><label>المنطقة</label><select id="f02_area" class="msp-input" required></select></div>
                    <div class="msp-item"><label>اسم المنشأة</label><input type="text" id="f03_facility_name" class="msp-input" required></div>
                    <div class="msp-item"><label>نوع المنشأة</label><select id="f04_facility_type" class="msp-input"></select></div>
                    <div class="msp-item"><label>القطاع الصناعي</label><select id="f05_industrial_sector" class="msp-input"></select></div>
                    <div class="msp-item"><label>العنوان التفصيلي</label><input type="text" id="f06_address" class="msp-input"></div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-header"><i class="fas fa-address-book"></i> بيانات التواصل</div>
                <div class="msp-grid">
                    <div class="msp-item"><label>الشخص المسؤول</label><input type="text" id="f07_contact_person" class="msp-input"></div>
                    <div class="msp-item"><label>المسمى الوظيفي</label><input type="text" id="f08_job_title" class="msp-input"></div>
                    <div class="msp-item"><label>رقم الهاتف</label><input type="tel" id="f09_phone" class="msp-input"></div>
                    <div class="msp-item"><label>البريد الإلكتروني</label><input type="email" id="f10_email" class="msp-input"></div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-header"><i class="fas fa-file-invoice"></i> تفاصيل الزيارة والاحتياجات</div>
                <div class="msp-grid">
                    <div class="msp-item"><label>استخدام الكرتون</label><select id="f11_uses_carton" class="msp-input"></select></div>
                    <div class="msp-item"><label>الكمية الشهرية (تقريبي)</label><input type="number" id="f12_monthly_qty" class="msp-input"></div>
                    <div class="msp-item"><label>درجة الاهتمام</label><select id="f13_interest_level" class="msp-input">
                        <option value="">-- اختر --</option>
                        <option value="High">مرتفع</option>
                        <option value="Medium">متوسط</option>
                        <option value="Low">منخفض</option>
                    </select></div>
                    <div class="msp-item"><label>فرصة البيع</label><select id="f14_sales_opportunity" class="msp-input"></select></div>
                    <div class="msp-item"><label>تاريخ الزيارة</label><input type="date" id="f17_visit_date" class="msp-input" required></div>
                    <div class="msp-item"><label>المندوب</label><select id="f16_sales_rep" class="msp-input"></select></div>
                    <div class="msp-item full-width"><label>ملاحظات إضافية</label><textarea id="f15_notes" class="msp-input" rows="3"></textarea></div>
                </div>
            </div>

            <div class="msp-btn-bar">
                <button type="submit" id="btnSave" class="btn-primary"><i class="fas fa-save"></i> حفظ البيانات</button>
                <button type="button" id="btnReset" class="btn-secondary"><i class="fas fa-redo"></i> زيارة جديدة</button>
            </div>
        </form>

        <div class="table-toolbar">
            <div id="recordsCount" class="records-count">عدد السجلات: 0</div>
            <input type="text" id="globalSearch" placeholder="بحث شامل..." class="search-input">
        </div>

        <div class="msp-table-section">
            <table>
                <thead>
                    <tr>
                        <th><div class="filter-header-cell"><input type="text" class="col-filter" data-col="f17_visit_date" placeholder="فلترة..."><span>التاريخ</span></div></th>
                        <th><div class="filter-header-cell"><input type="text" class="col-filter" data-col="f03_facility_name" placeholder="فلترة..."><span>المنشأة</span></div></th>
                        <th><div class="filter-header-cell"><input type="text" class="col-filter" data-col="f01_governorate" placeholder="فلترة..."><span>المحافظة</span></div></th>
                        <th><div class="filter-header-cell"><input type="text" class="col-filter" data-col="f16_sales_rep" placeholder="فلترة..."><span>المندوب</span></div></th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="visitsTableBody"></tbody>
            </table>
        </div>
    </div>
    
    <div id="mspModal" class="msp-modal"><div class="modal-content"><div id="modalIcon"></div><h3 id="modalTitle"></h3><p id="modalMsg"></p><button onclick="closeMSPModal()" class="modal-btn">إغلاق</button></div></div>

    <script src="global-config.js"></script>
    <script src="visits.js"></script>
    <script>window.addEventListener('load', () => { initGlobalEngine(); });</script>
</body>
</html>
